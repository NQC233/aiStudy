name: spec12d-regression

on:
  workflow_dispatch:
  pull_request:
    branches: [dev]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docs/specs/spec-12d-**"
      - "docs/checklist.md"
      - ".github/workflows/spec12d-regression.yml"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./backend

      - name: Backend tests (spec12d scope)
        run: |
          python -m unittest \
            backend/tests/test_spec12d_benchmark_service.py \
            backend/tests/test_llm_prompt_compaction.py \
            backend/tests/test_retrieval_hybrid_rrf.py \
            backend/tests/test_query_rewrite_service.py \
            backend/tests/test_rag_eval_s0_runner.py -v

      - name: Backend compile check
        run: python -m compileall backend/app backend/main.py

      - name: Spec12D gate check (committed summary)
        run: |
          python backend/scripts/spec12d_gate.py \
            --summary backend/tests/fixtures/spec12d_summary_pass.csv \
            --min-hit-rate 0.92 \
            --min-citation-rate 0.92 \
            --max-e2e-p95-ms 8000

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install and build
        run: |
          cd frontend
          npm ci
          npm run build
